name: Shell smoke

on:
  push:
    paths:
      - 'bin/**/*.sh'
      - '.github/workflows/shell-smoke.yml'
  pull_request:
    paths:
      - 'bin/**/*.sh'
      - '.github/workflows/shell-smoke.yml'

jobs:
  shell-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run shell smoke check
        run: bash bin/verify-shell-scripts.sh
