name: "Update Repository Tag & Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "update-tag-and-release-${{ github.event_name }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  update-tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve auth token
        id: auth_token
        shell: bash
        run: |
          echo "token=${{ github.token }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag_latest
        uses: DCx7C5/actions/tag-get-latest@v1
        env:
          GH_TOKEN: ${{ steps.auth_token.outputs.token }}

      - name: Detect release window
        id: release_window
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.tag_latest.outputs.tag_name }}"
          if [[ -z "$latest" || "$latest" == "null" ]]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
            echo "range=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(git rev-list --count "${latest}..HEAD")" -eq 0 ]]; then
            echo "No commits since latest tag; nothing to release."
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            echo "range=${latest}..HEAD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_commits=true" >> "$GITHUB_OUTPUT"
          echo "range=${latest}..HEAD" >> "$GITHUB_OUTPUT"

      - name: Prepare tag and release notes
        id: next_tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.release_window.outputs.has_commits }}" != "true" ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="${{ steps.tag_latest.outputs.tag_name }}"
          if [[ -z "$latest" || "$latest" == "null" ]]; then
            latest="v0.0.0"
          fi

          core="${latest#v}"
          IFS='.' read -r major minor patch <<< "$core"

          range="${{ steps.release_window.outputs.range }}"
          if [[ -n "$range" ]]; then
            commit_text="$(git log --format='%s%n%b' "$range")"
            release_notes="$(git log --format='- %h %s (%an)' "$range" | cat)"
          else
            commit_text="$(git log --format='%s%n%b')"
            release_notes="$(git log --format='- %h %s (%an)' | cat)"
          fi

          bump="patch"
          if grep -Eq 'BREAKING CHANGE|^[^ ]+!:' <<< "$commit_text"; then
            bump="major"
          elif grep -Eq '^feat(\(|:)' <<< "$commit_text"; then
            bump="minor"
          fi

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          if [[ -z "$release_notes" ]]; then
            release_notes="- No user-facing changes recorded."
          fi

          echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            echo "$release_notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect GPG signing availability
        if: steps.next_tag.outputs.tag != ''
        id: gpg_ready
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.GPG_PRIVATE_KEY }}" && -n "${{ secrets.GPG_PASSPHRASE }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::GPG_PRIVATE_KEY/GPG_PASSPHRASE not set; continuing without signed tags."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.next_tag.outputs.tag != '' && steps.gpg_ready.outputs.enabled == 'true'
        id: gpg_import
        uses: DCx7C5/actions/gpg-import@v1
        with:
          import-method: "inline"
          key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-pass: ${{ secrets.GPG_PASSPHRASE }}
          delete-after-import: "true"
          configure-git: "true"
          initialize-home: "true"
          preset-passphrase-cache: "true"
          gh-token: ${{ steps.auth_token.outputs.token }}

      - name: Bump script version
        if: steps.next_tag.outputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail
          new_version="${{ steps.next_tag.outputs.tag }}"
          new_version="${new_version#v}"
          sed -i -E "s/^readonly PROG_VERSION=\"[0-9]+\.[0-9]+\.[0-9]+\"/readonly PROG_VERSION=\"${new_version}\"/" bin/dystopian-sbh.sh

      - name: Commit version bump
        if: steps.next_tag.outputs.tag != ''
        id: commit
        uses: DCx7C5/actions/git-commit@v1
        with:
          message: "chore(release): bump version to ${{ steps.next_tag.outputs.tag }} [skip release]"
          skip-if-no-changes: "true"

      - name: Push bump commit
        if: steps.next_tag.outputs.tag != '' && steps.commit.outputs.committed == 'true'
        uses: DCx7C5/actions/git-push-changes@v1
        with:
          gh-token: ${{ steps.auth_token.outputs.token }}

      - name: Configure Git identity for tagging
        if: steps.next_tag.outputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Create and push new tag
        if: steps.next_tag.outputs.tag != ''
        id: tag_create
        shell: bash
        env:
          TAG_NAME: ${{ steps.next_tag.outputs.tag }}
          GPG_ENABLED: ${{ steps.gpg_ready.outputs.enabled }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_HOME: ${{ steps.gpg_import.outputs.gpg_home }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"
          git fetch --tags --force

          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::notice::Remote tag ${tag} already exists; reusing it."
            echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "::notice::Tag ${tag} already exists; reusing it."
            echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GPG_ENABLED}" == "true" ]]; then
            export GNUPGHOME="${GPG_HOME}"
            git tag -s "${tag}" -m "Release ${tag}" --force
          else
            git tag -a "${tag}" -m "Release ${tag}" --force
          fi

          if git push origin "refs/tags/${tag}"; then
            :
          elif git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::notice::Remote tag ${tag} exists after push attempt; treating as success."
          else
            echo "::error::Failed to push tag ${tag}" >&2
            exit 1
          fi

          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.next_tag.outputs.tag != ''
        id: release_create
        uses: DCx7C5/actions/gh-create-release@v1
        env:
          GNUPGHOME: ${{ steps.gpg_import.outputs.gpg_home }}
        with:
          release-tag: ${{ steps.tag_create.outputs.tag_name || steps.next_tag.outputs.tag }}
          release-name: ${{ steps.tag_create.outputs.tag_name || steps.next_tag.outputs.tag }}
          release-body: ${{ steps.next_tag.outputs.release_notes }}
          generate-notes: "false"
          fail-if-exists: "false"
          prerelease: "false"
          draft: "false"
          gh-token: ${{ steps.auth_token.outputs.token }}

      - name: Cleanup GPG keys from runner
        if: steps.next_tag.outputs.tag != '' && steps.gpg_import.outputs.gpg_home != ''
        uses: DCx7C5/actions/gpg-cleanup@v1
        with:
          gpg-home: ${{ steps.gpg_import.outputs.gpg_home }}

      - name: Validate Telegram token format
        id: tg_ready
        shell: bash
        run: |
          set -euo pipefail
          token='${{ secrets.TELEGRAM_BOT_TOKEN }}'
          chat='${{ secrets.TELEGRAM_CHANNEL_ID }}'
          if [[ -n "$token" && -n "$chat" && "$token" =~ ^[0-9]+:[A-Za-z0-9_-]{20,}$ ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Telegram token/chat-id missing or malformed; skipping Telegram notification."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify on success
        if: success() && steps.next_tag.outputs.tag != '' && steps.tg_ready.outputs.enabled == 'true'
        continue-on-error: true
        uses: DCx7C5/actions/tg-notify-release@v1
        with:
          tg-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          fingerprint: ${{ steps.gpg_import.outputs.fingerprint }}
          tag-name: ${{ steps.tag_create.outputs.tag_name || steps.next_tag.outputs.tag }}
          release-name: ${{ steps.tag_create.outputs.tag_name || steps.next_tag.outputs.tag }}
